name: Linux Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y gcc-multilib g++-multilib libmariadb-dev:i386 || sudo apt-get install -y gcc-multilib g++-multilib libmysqlclient-dev:i386

    - name: Build blakserv
      run: |
        cd blakserv
        make -f makefile.linux

    - name: Upload blakserv binary
      uses: actions/upload-artifact@v4
      with:
        name: blakserv-linux
        path: run/server/blakserv
